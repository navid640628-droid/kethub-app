<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title id="doc-title">کتاب‌باز</title>
  <meta name="description" id="doc-description" content="">
  <meta name="theme-color" content="#1f4d3d">
  <link rel="manifest" href="../manifest.json">
  <link rel="icon" href="../favicon.ico" sizes="any">
  <link rel="icon" href="../assets/icons/icon-48.png" sizes="48x48" type="image/png">
  <link rel="icon" href="../assets/icons/icon-192.png" sizes="192x192" type="image/png">
  <link rel="icon" href="../assets/icons/icon-192.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="../assets/icons/apple-touch-icon.png">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>

  <header class="site-header">
    <div class="container site-header__inner">
      <a href="../" class="brand">
        <span class="brand__mark">ک</span>
        <span class="brand__text">کتاب‌باز</span>
      </a>
      <nav class="main-nav" aria-label="ناوبری اصلی">
        <a href="../">خانه</a>
        <a href="podcasts.html">پادکست‌ها</a>
        <a href="marginalia.html">حاشیه‌ها</a>
        <a href="figures.html">مشاهیر</a>
        <a href="my-library.html">کتابخانه‌ی من</a>
      </nav>
      <a class="btn-telegram" href="https://t.me/kmketab" target="_blank" rel="noopener">کانال تلگرام ↗</a>
    </div>
  </header>

  <main class="container" id="book-root">
    <p class="breadcrumb" id="breadcrumb">در حال بارگذاری…</p>
    <div id="book-detail-content">
      <p class="empty-state">در حال بارگذاری اطلاعات کتاب…</p>
    </div>

    <section class="related-section" id="related-section" hidden>
      <h2>کتاب‌های مرتبط</h2>
      <div id="related-grid" class="book-grid"></div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container site-footer__inner">
      <div>
        <div class="brand" style="margin-bottom:10px;">
          <span class="brand__mark">ک</span>
          <span>کتاب‌باز</span>
        </div>
        <p style="max-width:320px;color:#9fae9e;font-size:0.88rem;">کتاب‌باز جایی برای کشف، خواندن و شنیدن کتاب‌های خوب است.</p>
      </div>
      <div>
        <p style="margin:0 0 10px;font-weight:700;">دسترسی سریع</p>
        <p style="margin:0 0 8px;"><a href="category.html?genre=novel">رمان و داستان</a></p>
        <p style="margin:0 0 8px;"><a href="category.html?genre=poetry">شعر و ادبیات</a></p>
        <p style="margin:0;"><a href="https://t.me/kmketab" target="_blank" rel="noopener">کانال تلگرام</a></p>
      </div>
    </div>
    <div class="site-footer__bottom container">© کتاب‌باز — تمام حقوق محفوظ است.</div>
  </footer>

  <script src="https://unpkg.com/lucide@0.552.0/dist/umd/lucide.js"></script>
  <script src="../js/storage.js"></script>
  <script src="../js/library.js"></script>
  <script src="../js/seo.js"></script>
  <script src="../js/books.js"></script>
  <script src="../js/audio-player.js"></script>
  <script src="../js/bottom-nav.js"></script>
  <script>
    (async function initBookPage() {
      KetabBazStorage.getUserId();

      const params = new URLSearchParams(window.location.search);
      const bookId = params.get("id");
      const contentEl = document.getElementById("book-detail-content");
      const breadcrumbEl = document.getElementById("breadcrumb");

      if (!bookId) {
        contentEl.innerHTML = `<p class="empty-state">شناسه‌ی کتاب مشخص نشده است.</p>`;
        return;
      }

      let books;
      try {
        books = await KetabBazBooks.fetchBooks("../data/books.json");
      } catch (e) {
        contentEl.innerHTML = `<p class="empty-state">مشکلی در بارگذاری اطلاعات کتاب پیش آمد.</p>`;
        return;
      }

      const book = KetabBazBooks.findById(books, bookId);
      if (!book) {
        contentEl.innerHTML = `<p class="empty-state">کتابی با این شناسه پیدا نشد.</p>`;
        return;
      }

      const pageUrl = window.location.href;

      KetabBazSEO.applyPageMeta({
        title: `${book.title} - نوشته‌ی ${book.author} | کتاب‌باز`,
        description: book.summary,
        keywords: book.tags,
        image: `../${book.cover}`,
        url: pageUrl,
      });
      KetabBazSEO.injectJSONLD(KetabBazSEO.buildBookSchema(book, pageUrl), "kb-book-schema");
      KetabBazSEO.injectJSONLD(
        KetabBazSEO.buildBreadcrumb([
          { name: "خانه", url: "../" },
          { name: KetabBazBooks.genreLabel(book.genre), url: `category.html?genre=${book.genre}` },
          { name: book.title, url: pageUrl },
        ]),
        "kb-breadcrumb-schema"
      );

      breadcrumbEl.innerHTML = `
        <a href="../">خانه</a> ›
        <a href="category.html?genre=${book.genre}">${KetabBazBooks.genreLabel(book.genre)}</a> ›
        <span>${book.title}</span>
      `;

      const isFav = KetabBazStorage.isFavorite(book.id);

      contentEl.innerHTML = `
        <article class="book-detail">
          <div class="book-detail__cover">
            <img src="../${book.cover}" alt="جلد کتاب ${book.title}" width="280" height="400">
          </div>
          <div class="book-detail__info">
            <h1>${book.title}</h1>
            <p class="book-detail__author">نوشته‌ی ${book.author} · <span class="score"><i data-lucide="star" style="width:14px;height:14px;vertical-align:-2px;fill:currentColor;"></i> ${book.score}</span></p>
            <div class="book-detail__tags">
              <span class="tag">${KetabBazBooks.genreLabel(book.genre)}</span>
              <span class="tag tag--muted">${KetabBazBooks.typeLabel(book.type)}</span>
              <span class="tag tag--muted">${KetabBazBooks.languageLabel(book.language)}</span>
            </div>
            <p class="book-detail__summary">${book.summary}</p>

            <div class="highlights">
              <h2>نکات مهم کتاب</h2>
              <ul>
                ${book.highlights.map((h) => `<li>${h}</li>`).join("")}
              </ul>
            </div>

            <div id="book-marginalia"></div>

            <div id="audio-mount"></div>

            <div class="detail-actions">
              <button class="btn ${isFav ? "btn--primary" : "btn--outline"}" id="fav-toggle" style="display:inline-flex;align-items:center;gap:6px;">
                <i data-lucide="heart" class="fav-icon" style="${isFav ? "fill:currentColor;" : ""}"></i>
                <span id="fav-toggle-label">${isFav ? "در علاقه‌مندی‌ها" : "افزودن به علاقه‌مندی‌ها"}</span>
              </button>
              ${book.pdf ? `<a class="btn btn--accent" href="../${book.pdf}" target="_blank" rel="noopener">دانلود PDF</a>` : ""}
              <a class="btn btn--outline" href="${book.telegram}" target="_blank" rel="noopener">مشاهده در تلگرام</a>
            </div>

            <div id="library-widget" class="highlights" style="border-inline-start-color: var(--color-accent);"></div>
          </div>
        </article>
      `;

      if (window.lucide) window.lucide.createIcons();

      renderLibraryWidget();
      function renderLibraryWidget() {
        const widget = document.getElementById("library-widget");
        const inLibrary = KetabBazLibrary.findByBookId(book.id);
        const STATUS_LABEL = { want: "می‌خوام بخونم", reading: "در حال خواندن", read: "خوانده‌ام", dropped: "رها شده" };
        if (inLibrary) {
          widget.innerHTML = `
            <h2>کتابخانه‌ی شخصی من</h2>
            <p>این کتاب توی لیست «${STATUS_LABEL[inLibrary.status]}» توئه.</p>
            <a class="btn btn--outline" href="my-library.html">مدیریت در کتابخانه‌ی من ›</a>
          `;
        } else {
          widget.innerHTML = `
            <h2>کتابخانه‌ی شخصی من</h2>
            <p style="margin-bottom:12px;">این کتاب رو به کتابخانه‌ی شخصی‌ات اضافه کن (بدون نیاز به ثبت‌نام):</p>
            <div class="detail-actions" style="margin-bottom:0;">
              <button class="btn btn--outline" data-add-status="want">می‌خوام بخونم</button>
              <button class="btn btn--outline" data-add-status="reading">در حال خواندنشم</button>
              <button class="btn btn--outline" data-add-status="read">قبلاً خوندمش</button>
            </div>
          `;
          widget.querySelectorAll("[data-add-status]").forEach((btn) => {
            btn.addEventListener("click", () => {
              KetabBazLibrary.addFromCatalog(book, btn.getAttribute("data-add-status"));
              renderLibraryWidget();
            });
          });
        }
      }

      document.getElementById("fav-toggle").addEventListener("click", (e) => {
        const active = KetabBazStorage.toggleFavorite(book.id);
        const toggleBtn = document.getElementById("fav-toggle");
        toggleBtn.className = `btn ${active ? "btn--primary" : "btn--outline"}`;
        document.getElementById("fav-toggle-label").textContent = active ? "در علاقه‌مندی‌ها" : "افزودن به علاقه‌مندی‌ها";
        toggleBtn.querySelector(".fav-icon").style.fill = active ? "currentColor" : "";
      });

      if (book.audio) {
        let tracks;
        if (Array.isArray(book.audio)) {
          // چند فصل: هر آیتم { title, src }
          tracks = book.audio.map((chapter, i) => ({
            id: `${book.id}-ch${i + 1}`,
            title: chapter.title || `فصل ${i + 1}`,
            subtitle: `${book.title} · فصل ${i + 1} از ${book.audio.length}`,
            src: `../${chapter.src}`,
          }));
        } else {
          // یک فایل صوتی واحد
          tracks = [{ id: book.id, title: book.title, subtitle: book.author, src: `../${book.audio}` }];
        }
        new KetabBazAudioPlayer(document.getElementById("audio-mount"), tracks);
      }

      const related = KetabBazBooks.findRelated(books, book);
      if (related.length) {
        document.getElementById("related-section").hidden = false;
        KetabBazBooks.renderGrid(document.getElementById("related-grid"), related, {
          pagesPrefix: "",
          assetsPrefix: "../",
        });
      }

      // حاشیه‌ها و حقایق خواندنی مربوط به همین کتاب (در صورت وجود)
      try {
        const marginaliaRes = await fetch("../data/marginalia.json");
        const marginalia = await marginaliaRes.json();
        const bookMarginalia = marginalia.filter((m) => m.bookId === book.id);
        if (bookMarginalia.length) {
          document.getElementById("book-marginalia").innerHTML = `
            <div class="highlights" style="border-inline-start-color: var(--color-primary);">
              <h2>حاشیه‌ها و نکات خواندنی</h2>
              ${bookMarginalia
                .map((m) => `<p style="font-family:var(--font-quote);font-size:1.02rem;margin-bottom:10px;">${m.text}</p>`)
                .join("")}
              <a href="marginalia.html" class="tag" style="display:inline-block;margin-top:6px;">مشاهده‌ی همه‌ی حاشیه‌ها ›</a>
            </div>
          `;
        }
      } catch (e) {
        /* حاشیه‌ها اختیاری‌اند؛ در صورت خطا نادیده گرفته می‌شود */
      }
    })();
  </script>
</body>
</html>
